<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>可不可愛、日文厲害</title>
</head>
<body>
<style>
:root{
  --night:#1a1c2c;
  --panel:#29366f;
  --panel-hi:#3b5dc9;
  --ink:#f4f4f4;
  --dim:#94b0c2;
  --gold:#ffcd75;
  --pink:#ff9edb;
  --green:#38b764;
  --red:#e53b44;
  --shadow:#0f0f1b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--night);
  color:var(--ink);
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  overscroll-behavior:none;
}
#scan{position:fixed;inset:0;pointer-events:none;z-index:99;
  background:repeating-linear-gradient(0deg,rgba(15,15,27,.16) 0 1px,transparent 1px 3px);}
#stage{max-width:520px;margin:0 auto;padding:14px 12px 28px;min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;gap:14px;flex:1;}
.screen.on{display:flex;animation:popin .18s ease-out;}
canvas.spr{image-rendering:pixelated;display:block;}

.panel{background:var(--panel);border:4px solid var(--ink);box-shadow:0 6px 0 var(--shadow);
  padding:14px;border-radius:2px;}
.btn{font-family:inherit;font-size:16px;font-weight:700;color:var(--ink);
  background:var(--panel-hi);border:3px solid var(--ink);box-shadow:0 4px 0 var(--shadow);
  padding:10px 16px;cursor:pointer;border-radius:2px;line-height:1.3;}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}
.btn:focus-visible{outline:3px dashed var(--gold);outline-offset:2px;}
.btn.gold{background:var(--gold);color:#3a2a00;}
.btn.pink{background:var(--pink);color:#5a0f3c;}
.btn.ghostbtn{background:transparent;color:var(--dim);border-color:var(--dim);}
.btn:disabled{opacity:.35;cursor:default;}
.btn:disabled:active{transform:none;box-shadow:0 4px 0 var(--shadow);}
.tag{display:inline-block;font-size:12px;letter-spacing:2px;color:var(--dim);
  border:2px solid var(--dim);padding:2px 8px;border-radius:2px;}
.small{font-size:12px;color:var(--dim);line-height:1.6;}
.mono{font-family:"Courier New",monospace;font-variant-numeric:tabular-nums;}

/* ---------- title ---------- */
#scr-title{justify-content:center;text-align:center;gap:22px;}
.logo{font-weight:900;line-height:1.25;text-wrap:balance;}
.logo .l1{display:block;font-size:38px;letter-spacing:8px;color:var(--pink);
  text-shadow:3px 3px 0 var(--shadow),6px 6px 0 rgba(59,93,201,.55);}
.logo .l2{display:block;font-size:38px;letter-spacing:8px;color:var(--gold);
  text-shadow:3px 3px 0 var(--shadow),6px 6px 0 rgba(229,59,68,.45);}
.logo .sub{display:block;margin-top:12px;font-size:13px;letter-spacing:4px;color:var(--dim);font-weight:400;}
.vs{display:flex;justify-content:center;align-items:flex-end;gap:34px;}
.vs .bob{animation:bob 1.6s ease-in-out infinite;}
.vs .bob2{animation:bob 1.6s ease-in-out .8s infinite;}
.pressstart{animation:blink 1.4s steps(2) infinite;}

/* ---------- world map / hud ---------- */
.hud{display:flex;flex-direction:column;gap:8px;}
.hud .row1{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
.hud .lv{font-size:20px;font-weight:900;color:var(--gold);}
.hud .weapon{font-size:13px;color:var(--pink);}
.bar{height:14px;border:3px solid var(--ink);background:var(--shadow);border-radius:2px;overflow:hidden;}
.bar .fill{height:100%;background:var(--gold);transition:width .6s steps(12);}
.bar .fill.grn{background:var(--green);}
.bufchip{font-size:12px;color:#3a2a00;background:var(--gold);border:2px solid var(--ink);
  padding:3px 8px;border-radius:2px;align-self:flex-start;}
.chlist{display:flex;flex-direction:column;gap:14px;}
.chcard{display:flex;gap:14px;align-items:center;cursor:default;}
.chcard.locked{filter:grayscale(1) brightness(.6);}
.chcard .info{flex:1;min-width:0;}
.chcard h3{margin:0 0 4px;font-size:16px;}
.chcard .preview{font-size:13px;color:var(--dim);letter-spacing:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chcard .acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.chcard .acts .btn{font-size:13px;padding:7px 12px;}
.star{color:var(--gold);font-size:13px;}
.regioncard{cursor:pointer;}
.regioncard .rprog{margin-top:8px;}
.regioncard.locked{cursor:default;}

/* ---------- learn ---------- */
.dots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.dots i{width:10px;height:10px;background:var(--shadow);border:2px solid var(--dim);}
.dots i.onn{background:var(--gold);border-color:var(--ink);}
.card3d{perspective:900px;cursor:pointer;}
.cardinner{position:relative;transition:transform .45s;transform-style:preserve-3d;min-height:250px;}
.card3d.flip .cardinner{transform:rotateY(180deg);}
.cface{backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;
  min-height:250px;padding:18px;text-align:center;}
.cback{position:absolute;inset:0;transform:rotateY(180deg);background:var(--panel-hi);
  border-radius:2px;}
.bigjp{font-size:52px;font-weight:900;letter-spacing:2px;line-height:1.3;
  text-shadow:3px 3px 0 var(--shadow);}
.bigjp.phrase{font-size:28px;letter-spacing:0;}
.romaji{font-size:15px;color:var(--gold);letter-spacing:3px;}
.subkana{font-size:16px;color:var(--pink);letter-spacing:2px;}
.meaning{font-size:28px;font-weight:900;color:var(--gold);text-shadow:2px 2px 0 var(--shadow);}
.memo{font-size:14px;color:var(--ink);line-height:1.7;max-width:34ch;}
.exline{font-size:14px;color:var(--gold);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}
.learnnav{display:flex;gap:10px;}
.learnnav .btn{flex:1;}

/* ---------- battle ---------- */
.mhead{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.mname{font-weight:900;font-size:15px;color:var(--pink);}
.hpseg{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.hpseg i{width:14px;height:12px;background:var(--red);border:2px solid var(--ink);}
.hpseg i.off{background:var(--shadow);}
.mzone{position:relative;text-align:center;padding:10px 0 4px;}
.mzone .sprwrap{display:inline-block;animation:bob 1.8s ease-in-out infinite;}
.mzone.hit .sprwrap{animation:hitflash .35s steps(2);}
.taunt{font-size:12px;color:var(--dim);margin-top:6px;letter-spacing:1px;}
.floaty{position:absolute;left:50%;top:14%;transform:translate(-50%,0);
  font-weight:900;font-size:24px;color:var(--ink);text-shadow:2px 2px 0 var(--shadow);
  animation:floatup .9s ease-out forwards;pointer-events:none;white-space:nowrap;}
.floaty.crit{color:var(--gold);font-size:30px;}
.tbar{height:12px;border:3px solid var(--ink);background:var(--shadow);overflow:hidden;}
.tbar .tfill{height:100%;width:100%;background:var(--green);}
.tbar .tfill.hurry{background:var(--red);}
.qbox{text-align:center;min-height:96px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;}
.qword{font-size:42px;font-weight:900;text-shadow:3px 3px 0 var(--shadow);}
.qword.phrase{font-size:24px;}
.qask{font-size:13px;color:var(--dim);letter-spacing:2px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opts .btn{min-height:56px;font-size:17px;}
.opts .btn.right{background:var(--green);}
.opts .btn.wrong{background:var(--red);}
.bstat{display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:8px;}
.hearts{color:var(--red);font-size:20px;letter-spacing:3px;text-shadow:1px 1px 0 var(--shadow);}
.expchip{color:var(--gold);font-weight:700;}
.battlewrap.shake{animation:shake .45s steps(6);}

/* ---------- result ---------- */
.rtitle{font-size:30px;font-weight:900;text-align:center;letter-spacing:6px;
  text-shadow:3px 3px 0 var(--shadow);}
.rtitle.winc{color:var(--gold);}
.rtitle.losec{color:var(--red);}
.rexp{text-align:center;font-size:18px;}
.lvup{background:var(--gold);color:#3a2a00;border:3px solid var(--ink);box-shadow:0 4px 0 var(--shadow);
  padding:10px;text-align:center;font-weight:900;letter-spacing:2px;animation:popin .4s;}
.buffrow{display:flex;gap:10px;}
.buffcard{flex:1;background:var(--panel-hi);border:3px solid var(--ink);box-shadow:0 4px 0 var(--shadow);
  padding:12px 8px;text-align:center;cursor:pointer;border-radius:2px;}
.buffcard .bic{font-size:26px;}
.buffcard h4{margin:6px 0 4px;font-size:14px;color:var(--gold);}
.buffcard p{margin:0;font-size:12px;color:var(--ink);line-height:1.5;}
.buffcard.dead{opacity:.3;pointer-events:none;}
.buffcard.picked{background:var(--green);}
.deadspr{filter:grayscale(1) brightness(.7);transform:rotate(110deg);display:inline-block;}

/* ---------- talk (對話劇情) ---------- */
.talkjp{font-size:20px;font-weight:900;line-height:1.7;margin:6px 0 4px;}
.talkopt{text-align:left;display:flex;flex-direction:column;gap:2px;}
.talkopt.right{background:var(--green);}
.talkopt.wrong{background:var(--red);}
.npcbox{display:flex;align-items:center;gap:14px;}

/* ---------- write ---------- */
.kanachips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.kanachips .btn{font-size:20px;padding:6px 14px;}
.kanachips .btn.onn{background:var(--gold);color:#3a2a00;}
.writebox{position:relative;width:300px;height:300px;margin:0 auto;
  border:4px dashed var(--dim);background:rgba(15,15,27,.5);
  touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
#scr-write.on{touch-action:pan-y;}
.writebox canvas{position:absolute;inset:0;width:100%;height:100%;}
#cv-fx{touch-action:none;cursor:crosshair;}
.writeacts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

#toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(120px);
  background:var(--gold);color:#3a2a00;font-weight:900;border:3px solid var(--ink);
  box-shadow:0 4px 0 var(--shadow);padding:10px 18px;z-index:120;transition:transform .25s;
  border-radius:2px;pointer-events:none;max-width:90vw;text-align:center;line-height:1.5;}
#toast.show{transform:translateX(-50%) translateY(0);}

.screenhead{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.screenhead h2{margin:0;font-size:17px;letter-spacing:1px;}
.backbtn{font-size:13px;padding:6px 10px;}

@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes hitflash{0%,100%{filter:none}50%{filter:brightness(3) saturate(0);}}
@keyframes floatup{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-70px) scale(1.15)}}
@keyframes popin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}
</style>

<div id="scan"></div>
<div id="stage">

  <!-- 標題畫面 -->
  <div class="screen" id="scr-title">
    <div class="tag" style="align-self:center;">PIXEL RPG × 日本語　新手村 → N1 魔王城</div>
    <h1 class="logo" style="margin:0;">
      <span class="l1">可不可愛</span>
      <span class="l2">日文厲害</span>
      <span class="sub">KAWAII QUEST ─ 從五十音打到 N1 的日文冒險</span>
    </h1>
    <div class="vs">
      <span class="bob"><canvas class="spr" id="cv-hero"></canvas></span>
      <span style="color:var(--dim);font-weight:900;">VS</span>
      <span class="bob2"><canvas class="spr" id="cv-boss-t"></canvas></span>
    </div>
    <button class="btn gold pressstart" style="align-self:center;font-size:19px;padding:14px 34px;" onclick="startGame()">▶ 開始冒險</button>
    <p class="small" style="text-align:center;margin:0;">
      免安裝・進度自動存在這台裝置的瀏覽器<br>
      建議開啟聲音，體驗 8-bit 音效與日文發音
    </p>
    <button class="btn ghostbtn" style="align-self:center;font-size:12px;padding:5px 10px;" onclick="resetSave()">重置進度</button>
  </div>

  <!-- 世界地圖（區域選擇） -->
  <div class="screen" id="scr-map">
    <div class="panel hud" id="hud"></div>
    <div class="chlist" id="regionlist"></div>
    <p class="small" style="text-align:center;margin:0;">每個區域通關一半以上，就會開啟下一個區域</p>
  </div>

  <!-- 區域（章節選擇） -->
  <div class="screen" id="scr-region">
    <div class="screenhead">
      <h2 id="region-title"></h2>
      <button class="btn ghostbtn backbtn" onclick="go('map');renderMap()">← 世界地圖</button>
    </div>
    <div class="chlist" id="chlist"></div>
  </div>

  <!-- 學習模式 -->
  <div class="screen" id="scr-learn">
    <div class="screenhead">
      <h2 id="learn-title"></h2>
      <button class="btn ghostbtn backbtn" onclick="openRegion(curRegion)">← 返回</button>
    </div>
    <div class="dots" id="learn-dots"></div>
    <div class="card3d" id="learn-card" onclick="flipCard()"></div>
    <p class="small" style="text-align:center;margin:0;">點卡片翻面看意思與聯想記憶</p>
    <div class="learnnav">
      <button class="btn" id="learn-prev" onclick="navLearn(-1)">← 上一張</button>
      <button class="btn" id="learn-next" onclick="navLearn(1)">下一張 →</button>
    </div>
    <button class="btn pink" id="learn-fight" style="font-size:17px;"></button>
  </div>

  <!-- 戰鬥 -->
  <div class="screen" id="scr-battle">
    <div class="battlewrap" id="battlewrap" style="display:flex;flex-direction:column;gap:14px;">
      <div class="panel" style="display:flex;flex-direction:column;gap:8px;">
        <div class="mhead">
          <span class="mname" id="b-mname"></span>
          <span class="hpseg" id="b-hp"></span>
        </div>
        <div class="mzone" id="b-mzone">
          <span class="sprwrap"><canvas class="spr" id="cv-monster"></canvas></span>
          <div class="taunt" id="b-taunt"></div>
        </div>
      </div>
      <div class="tbar"><div class="tfill" id="b-tfill"></div></div>
      <div class="panel qbox" id="b-qbox"></div>
      <div class="opts" id="b-opts"></div>
      <div class="bstat">
        <span class="hearts" id="b-hearts"></span>
        <button class="btn ghostbtn" style="font-size:12px;padding:4px 8px;" onclick="fleeBattle()">🏳 逃走</button>
        <span class="expchip mono" id="b-exp"></span>
      </div>
    </div>
  </div>

  <!-- 對話劇情 -->
  <div class="screen" id="scr-talk">
    <div class="screenhead">
      <h2 id="talk-title"></h2>
      <button class="btn ghostbtn backbtn" onclick="openRegion(curRegion)">← 返回</button>
    </div>
    <div class="panel npcbox">
      <canvas class="spr" id="cv-npc"></canvas>
      <div>
        <div class="mname" id="talk-npcname"></div>
        <div class="small" id="talk-progress"></div>
      </div>
    </div>
    <div class="panel">
      <div class="talkjp" id="talk-jp"></div>
      <div class="small" id="talk-zh"></div>
      <button class="btn" style="font-size:13px;padding:6px 10px;margin-top:8px;" onclick="sayTalk()">🔊 再聽一次</button>
    </div>
    <p class="small" style="text-align:center;margin:0;">選出最自然的回應（選錯不扣血，會告訴你為什麼）</p>
    <div id="talk-opts" style="display:flex;flex-direction:column;gap:10px;"></div>
  </div>

  <!-- 結算 -->
  <div class="screen" id="scr-result" style="justify-content:center;">
    <div id="result-body" style="display:flex;flex-direction:column;gap:16px;"></div>
  </div>

  <!-- 畫符文（寫字） -->
  <div class="screen" id="scr-write">
    <div class="screenhead">
      <h2 id="write-title">✍ 符文修行</h2>
      <button class="btn ghostbtn backbtn" onclick="openRegion(curRegion)">← 返回</button>
    </div>
    <div class="kanachips" id="write-chips"></div>
    <div class="panel" id="write-memo" style="padding:10px 12px;font-size:14px;line-height:1.7;"></div>
    <div class="writebox">
      <canvas id="cv-guide" width="600" height="600"></canvas>
      <canvas id="cv-ink" width="600" height="600"></canvas>
      <canvas id="cv-fx" width="600" height="600"></canvas>
    </div>
    <p class="small" style="text-align:center;margin:0;">沿著灰色的字，用手指或滑鼠一筆一畫描出符文</p>
    <div class="writeacts">
      <button class="btn" onclick="clearInk()">清除重寫</button>
      <button class="btn" onclick="sayCurrentKana()">🔊 聽發音</button>
      <button class="btn gold" onclick="finishWrite()">⚡ 注入靈力</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
'use strict';
/* ================= 內容資料 ================= */
// 假名章節：[假名, 羅馬音, 聯想記憶, 代表例字]
function kanaCh(id,name,mon,spr,arr){
  return {id,name,kind:'kana',monster:{name:mon,sprite:spr},
    items:arr.map(a=>({jp:a[0],ro:a[1],zh:a[1],memo:a[2],ex:a[3]}))};
}
// 單字：假名為主（N5/N4）
function vh(kana,kanji,zh,memo){return {jp:kana,sub:kanji,kana:kana,zh,memo};}
// 單字：漢字為主（N3+），sub 為假名讀音
function vk(kanji,kana,zh,memo){return {jp:kanji,sub:kana,kana:kana,zh,memo};}
function vocabCh(id,name,mon,spr,items){return {id,name,kind:'vocab',monster:{name:mon,sprite:spr},items};}
function phraseCh(id,name,mon,spr,items){return {id,name,kind:'phrase',monster:{name:mon,sprite:spr},items};}

const REGIONS=[
{id:'r0',icon:'slime',name:'新手村',desc:'先會打招呼，冒險就成功一半',chapters:[
  phraseCh('c1','勇者的第一句話','見習史萊姆','slime',[
    {jp:'ありがとう',ro:'a·ri·ga·to·u',zh:'謝謝',memo:'動漫出現率 No.1，先學先贏！'},
    {jp:'すごい',ro:'su·go·i',zh:'好厲害',memo:'看到必殺技時就大喊一聲！'},
    {jp:'かわいい',ro:'ka·wa·i·i',zh:'好可愛',memo:'本遊戲的核心精神，務必熟練。'},
    {jp:'おはよう',ro:'o·ha·yo·u',zh:'早安',memo:'對村民打招呼會提升好感度（大概）。'},
    {jp:'だいじょうぶ',ro:'da·i·jo·u·bu',zh:'沒問題',memo:'被史萊姆撞到時也要保持微笑說的話。'},
    {jp:'いただきます',ro:'i·ta·da·ki·ma·su',zh:'開動了',memo:'在旅館吃晚餐前的神聖儀式。'},
  ]),
  phraseCh('c1b','寒暄修行','寒暄史萊姆','slime',[
    {jp:'こんにちは',ro:'ko·n·ni·chi·wa',zh:'你好（白天）',memo:'白天的萬用招呼，寫は唸 wa。'},
    {jp:'こんばんは',ro:'ko·n·ba·n·wa',zh:'晚上好',memo:'太陽下山後改用這句。'},
    {jp:'すみません',ro:'su·mi·ma·se·n',zh:'不好意思',memo:'叫店員、借過、道歉，一句三用的神句。'},
    {jp:'ごめんなさい',ro:'go·me·n·na·sa·i',zh:'對不起',memo:'比すみません更正式的道歉。'},
    {jp:'おやすみなさい',ro:'o·ya·su·mi·na·sa·i',zh:'晚安（睡前）',memo:'睡覺前說的，跟こんばんは不同！'},
    {jp:'はじめまして',ro:'ha·ji·me·ma·shi·te',zh:'初次見面',memo:'自我介紹的開場白。'},
    {jp:'またね',ro:'ma·ta·ne',zh:'下次見',memo:'朋友之間輕鬆的再見。'},
  ]),
]},
{id:'r1',icon:'cat',name:'五十音之森',desc:'集齊假名，才能讀懂這個世界',chapters:[
  kanaCh('c2','あ行','假名貓貓','cat',[

/* ================= 音效（WebAudio 8-bit） ================= */
let _ac=null;
function ac(){
  if(!_ac){const C=window.AudioContext||window.webkitAudioContext;if(C)_ac=new C();}
  if(_ac&&_ac.state==='suspended')_ac.resume();
  return _ac;
}
function tone(f,d,delay,type,vol){
  const c=ac();if(!c)return;
  const t=c.currentTime+(delay||0);
  const o=c.createOscillator(),g=c.createGain();
  o.type=type||'square';o.frequency.value=f;
  g.gain.setValueAtTime(vol||.1,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g);g.connect(c.destination);
  o.start(t);o.stop(t+d);
}
const SFX={
 tap(){tone(660,.06);},
 flip(){tone(440,.05);tone(660,.05,.06);},
 ok(){tone(523,.09);tone(659,.09,.08);tone(784,.16,.16);},
 crit(){tone(659,.07);tone(880,.07,.06);tone(1175,.18,.12);tone(1568,.26,.18,'triangle',.09);},
 bad(){tone(180,.22,0,'sawtooth',.09);tone(120,.3,.08,'sawtooth',.09);},
 lvl(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,.12,i*.09));},
 win(){[392,523,659,784].forEach((f,i)=>tone(f,.12,i*.1));tone(1047,.35,.42);},
 lose(){[330,262,196,131].forEach((f,i)=>tone(f,.2,i*.15,'triangle'));},
 spark(){tone(1200+Math.random()*800,.04,0,'triangle',.05);},
};

/* ================= 日文發音（TTS） ================= */
function ttsOK(){return 'speechSynthesis' in window;}
let jaVoice=null;
function pickVoice(){
  if(!ttsOK())return;
  const vs=speechSynthesis.getVoices();
  jaVoice=vs.find(v=>v.lang&&v.lang.replace('_','-').toLowerCase().startsWith('ja'))||null;
}
if(ttsOK()){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(txt){
  if(!ttsOK()||!txt)return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='ja-JP';if(jaVoice)u.voice=jaVoice;u.rate=.85;
    speechSynthesis.speak(u);
  }catch(e){}
}
function sayItem(it){say(it.kana||it.jp);}

/* ================= 進度與解鎖 ================= */
function regionProgress(r){
  let done=0;
  r.chapters.forEach(c=>{if(save.clears[c.id])done++;});
  return{done,total:r.chapters.length};
}
function regionUnlocked(i){
  if(i===0)return true;
  const p=regionProgress(REGIONS[i-1]);
  return p.done>=Math.ceil(p.total/2);
}
function chapterUnlocked(r,idx){
  const ch=r.chapters[idx];
  if(ch.boss)return r.chapters.filter(c=>!c.boss).every(c=>save.clears[c.id]);
  if(idx===0)return true;
  return !!save.clears[r.chapters[idx-1].id];
}
function totalProgress(){
  let done=0,total=0;
  REGIONS.forEach(r=>{total+=r.chapters.length;const p=regionProgress(r);done+=p.done;});
  return{done,total};
}

const TAUNTS={slime:'ぷるぷる～ 你聽得懂我在說什麼嗎？',cat:'にゃ～ 唸得出來再說吧！',

function renderBstat(){
  let h='';
  for(let i=0;i<B.hearts;i++)h+='♥';
  $('b-hearts').textContent=h||'…';
  $('b-exp').textContent='EXP +'+B.exp+(B.mul>1?' (×2)':'');

function nextQ(){
  B.lock=false;
  const it=B.qs[B.qi];
  const listen=ttsOK()&&Math.random()<0.4;
  const kind=B.ch.kind;
  const optKey=(kind==='kana')?(listen?'jp':'ro'):'zh';
  // 選項池：假名章節可跨章混入其他假名；同標籤（如 じ/ぢ 同音）去重
  const cand=shuffle((kind==='kana'?KANA_ALL:B.ch.items).filter(x=>x!==it&&x[optKey]!==it[optKey]));
  const seen={};seen[it[optKey]]=1;
  const others=[];
  for(const c of cand){
    if(seen[c[optKey]])continue;
    seen[c[optKey]]=1;others.push(c);
    if(others.length===3)break;
  }
  B.cur={it,listen,optKey};
  B.opts=shuffle([it].concat(others));
  const ask=(kind==='kana')
    ?(listen?'仔細聽！是哪一個假名？':'這個假名怎麼唸？')
    :(kind==='phrase'
      ?(listen?'仔細聽！這句是什麼意思？':'這句是什麼意思？')
      :(listen?'仔細聽！這個單字是什麼意思？':'這個單字是什麼意思？'));
  $('b-qbox').innerHTML=
    '<div class="qask">'+ask+'</div>'+
    (listen
      ?'<button class="btn gold" style="font-size:22px;" onclick="sayItem(B.cur.it);SFX.tap();">🔊 再聽一次</button>'
      :'<div class="qword'+(kind==='phrase'?' phrase':'')+'">'+it.jp+'</div>'+
       (kind==='vocab'&&it.sub&&it.sub!==it.jp?'<div class="subkana">'+it.sub+'</div>':''));
  $('b-opts').innerHTML=B.opts.map((o,k)=>
    '<button class="btn" id="opt-'+k+'" onclick="answer('+k+')">'+o[optKey]+'</button>').join('');
  if(listen||kind!=='kana')setTimeout(()=>sayItem(it),350);
  B.t0=Date.now();B.deadline=B.t0+B.tlimit;
  const tf=$('b-tfill');tf.style.width='100%';tf.classList.remove('hurry');
  if(B.timer)clearInterval(B.timer);
  B.timer=setInterval(()=>{
    const remain=B.deadline-Date.now();
    const frac=Math.max(remain/B.tlimit,0);
    tf.style.width=(frac*100)+'%';
    tf.classList.toggle('hurry',frac<.35);
    if(remain<=0){clearInterval(B.timer);B.timer=null;timeUp();}
  },80);
}
function floaty(txt,crit){
  const s=document.createElement('span');
  s.className='floaty'+(crit?' crit':'');
  s.textContent=txt;
  $('b-mzone').appendChild(s);
  s.addEventListener('animationend',()=>s.remove());
}
function answer(k){
  if(B.lock)return;
  B.lock=true;
  if(B.timer){clearInterval(B.timer);B.timer=null;}
  const it=B.cur.it;
  const right=B.opts[k]===it;
  B.opts.forEach((o,i)=>{
    const b=$('opt-'+i);b.disabled=true;
    if(o===it)b.classList.add('right');
    else if(i===k)b.classList.add('wrong');
  });
  if(B.ch.kind==='kana'&&!B.cur.listen)sayItem(it);
  if(right){
    const remain=B.deadline-Date.now();
    const crit=remain>B.tlimit*.5;
    B.hp--;B.exp+=crit?15:10;
    (crit?SFX.crit:SFX.ok)();
    const mz=$('b-mzone');mz.classList.remove('hit');void mz.offsetWidth;mz.classList.add('hit');
    floaty(crit?'CRITICAL!!':'HIT!',crit);
    renderBstat();
    setTimeout(()=>{B.hp<=0?winBattle():(B.qi=(B.qi+1)%B.qs.length,nextQ());},950);
  }else{
    hurt('答錯了…正確是「'+it[B.cur.optKey]+'」');
  }
}
function timeUp(){
  if(B.lock)return;
  B.lock=true;
  const it=B.cur.it;
  B.opts.forEach((o,i)=>{const b=$('opt-'+i);b.disabled=true;if(o===it)b.classList.add('right');});
  hurt('時間到！正確是「'+it[B.cur.optKey]+'」');
}
function hurt(msg){
  B.hearts--;SFX.bad();
  const w=$('battlewrap');w.classList.remove('shake');void w.offsetWidth;w.classList.add('shake');
  toast(msg);
  B.qs.push(B.cur.it); // 答錯的字排回隊伍，直到打倒怪物為止
  renderBstat();
  setTimeout(()=>{B.hearts<=0?loseBattle():(B.qi=(B.qi+1)%B.qs.length,nextQ());},1200);
}

    '<button class="btn ghostbtn" onclick="go(\'map\');renderMap();">🗺 世界地圖</button>';
  go('result');
  drawSprite($('cv-rspr'),SPRITES[o.sprite],5);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const f=$('r-fill');if(f)f.style.width=Math.round(o.after.cur/o.after.need*100)+'%';
  }));
}
function winBattle(){
  let gained=B.exp+30;
  const first=!save.clears[B.ch.id];
  if(first)gained+=B.ch.boss?100:50;
  gained*=B.mul;
  const before=levelInfo(save.exp);
  save.exp+=gained;save.clears[B.ch.id]=true;persist();
  const after=levelInfo(save.exp);
  SFX.win();
  if(after.lv>before.lv)setTimeout(SFX.lvl,700);
  renderVictory({head:'VICTORY!',sprite:B.ch.monster.sprite,dead:true,
    lines:'擊敗 '+B.ch.monster.name+'！獲得 <b class="mono" style="color:var(--gold);">'+gained+' EXP</b>'+
      (B.mul>1?'（經驗加倍中✨）':'')+(first?'<br><span class="small">首次通關加成 +'+(B.ch.boss?100:50)+'！'+(B.ch.boss?'主題「'+REGIONS.find(r=>r.id===curRegion).name+'」制霸！':'')+'</span>':''),
    before,after});
}
function pickBuff(k,el){
  if(save.nextBuff)return;
  save.nextBuff=k;persist();SFX.ok();
  document.querySelectorAll('.buffcard').forEach(b=>b.classList.add('dead'));
  el.classList.remove('dead');el.classList.add('picked');
  toast('獲得祝福：'+BUFFS[k].name+'！');
}
function loseBattle(){
  SFX.lose();
  const chid=B.ch.id;
  $('result-body').innerHTML=
    '<div class="rtitle losec">被打敗了…</div>'+
    '<div class="panel" style="text-align:center;">'+
      '<p style="margin:0 0 6px;">'+B.ch.monster.name+'：「還差得遠呢～」</p>'+
      '<p class="small" style="margin:0;">小提示：先進「📖 學習」翻翻卡片，記住再來，暴擊率會大增！</p>'+
    '</div>'+
    '<button class="btn pink" style="font-size:17px;" onclick="startBattle(\''+chid+'\')">⚔ 再挑戰一次</button>'+
    '<button class="btn" onclick="startLearn(\''+chid+'\')">📖 先去複習</button>'+
    '<button class="btn ghostbtn" onclick="openRegion(curRegion)">← 返回</button>';
  go('result');
}

/* ================= 對話劇情（Visual Novel） ================= */
let T=null;
function startTalk(chid){
  const ch=CHMAP[chid];curRegion=REGION_OF[chid];
  T={ch,i:0,exp:0,tried:false};
  SFX.tap();go('talk');
  $('talk-title').textContent='💬 '+ch.name;
  $('talk-npcname').textContent=ch.npc.name;
  drawSprite($('cv-npc'),SPRITES[ch.npc.sprite],5);
  renderTalk();
}
function renderTalk(){
  const st=T.ch.steps[T.i];
  T.tried=false;
  $('talk-progress').textContent='第 '+(T.i+1)+' / '+T.ch.steps.length+' 回合';
  $('talk-jp').textContent=st.jp;
  $('talk-zh').textContent=st.zh;
  const order=shuffle(st.ch.map((_,k)=>k));
  $('talk-opts').innerHTML=order.map(k=>{
    const c=st.ch[k];
    return '<button class="btn talkopt" id="topt-'+k+'" onclick="talkPick('+k+')">'+
      '<span>'+c.jp+'</span><span class="small">'+c.zh+'</span></button>';
  }).join('');
  sayTalk();
}
function sayTalk(){
  const st=T.ch.steps[T.i];
  const jp=st.jp.replace(/（[^）]*）/g,'');
  if(jp)say(jp);
}
function talkPick(k){
  const st=T.ch.steps[T.i],c=st.ch[k];
  if(c.ok){
    SFX.ok();say(c.jp.replace(/（[^）]*）/g,''));
    T.exp+=T.tried?5:10;
    st.ch.forEach((_,i)=>{const b=$('topt-'+i);if(b)b.disabled=true;});
    $('topt-'+k).classList.add('right');
    setTimeout(()=>{
      T.i++;
      T.i>=T.ch.steps.length?endTalk():renderTalk();
    },1000);
  }else{
    SFX.bad();T.tried=true;
    const b=$('topt-'+k);b.classList.add('wrong');b.disabled=true;
    toast(c.why||'再想想看！');
  }
}
function endTalk(){
  const first=!save.clears[T.ch.id];
  const gained=T.exp+20+(first?30:0);
  const before=levelInfo(save.exp);
  save.exp+=gained;save.clears[T.ch.id]=true;persist();
  const after=levelInfo(save.exp);
  SFX.win();
  if(after.lv>before.lv)setTimeout(SFX.lvl,700);
  renderVictory({head:'對話完成！',sprite:T.ch.npc.sprite,dead:false,
    lines:ch2name(T.ch)+'對你露出了微笑。獲得 <b class="mono" style="color:var(--gold);">'+gained+' EXP</b>'+
      (first?'<br><span class="small">首次通關加成 +30！</span>':''),
    before,after});
}
function ch2name(ch){return '「'+ch.npc.name+'」';}

/* ================= 畫符文（寫字板） ================= */
let W=null,parts=[],drawing=false,lastP=null,strokeCount=0;
function startWrite(chid){
  W={ch:CHMAP[chid],i:0};curRegion=REGION_OF[chid];
  SFX.tap();go('write');renderWrite();
}
function renderWrite(){
  const ch=W.ch,it=ch.items[W.i];
  $('write-title').textContent='✍ 符文修行・'+ch.name;
  $('write-chips').innerHTML=ch.items.map((t,k)=>
    '<button class="btn'+(k===W.i?' onn':'')+'" onclick="W.i='+k+';SFX.tap();renderWrite();">'+t.jp+'</button>').join('');
  $('write-memo').innerHTML='💡 '+it.memo+
    (it.ex?'<br>例字：<b style="color:var(--gold);">'+it.ex+'</b>':'');
  const g=$('cv-guide'),x=g.getContext('2d');
  x.clearRect(0,0,g.width,g.height);
  x.fillStyle='rgba(148,176,194,.30)';
  x.font='900 '+(it.jp.length>1?'260px':'430px')+' "Microsoft JhengHei","PingFang TC",sans-serif';
  x.textAlign='center';x.textBaseline='middle';
  x.fillText(it.jp,300,330);
  clearInk();
}
function clearInk(){
  const c=$('cv-ink');c.getContext('2d').clearRect(0,0,c.width,c.height);
  strokeCount=0;
}
function sayCurrentKana(){sayItem(W.ch.items[W.i]);SFX.tap();}
function finishWrite(){
  if(strokeCount===0){toast('先寫寫看再注入靈力！');return;}
  spawnParts(300,300,46,3.2);
  SFX.lvl();
  save.exp+=5;persist();
  toast('「'+W.ch.items[W.i].jp+'」靈力注入成功！+5 EXP');
  setTimeout(()=>{W.i=(W.i+1)%W.ch.items.length;renderWrite();},900);
}
function spawnParts(x,y,n,pow){
  const cols=['#ffcd75','#ff9edb','#f4f4f4','#7ce26a','#3be0ff'];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=(pow||1)*(Math.random()*3+1);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.2,life:1,
      col:cols[Math.floor(Math.random()*cols.length)]});
  }
}
function fxLoop(){
  requestAnimationFrame(fxLoop);
  if(!$('scr-write').classList.contains('on')){if(parts.length)parts.length=0;return;}
  const cv=$('cv-fx'),x=cv.getContext('2d');
  x.clearRect(0,0,cv.width,cv.height);
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.025;
    if(p.life<=0){parts.splice(i,1);continue;}
    x.globalAlpha=Math.max(p.life,0);
    x.fillStyle=p.col;
    const s=10*p.life+2;
    x.fillRect(p.x-s/2,p.y-s/2,s,s);
  }
  x.globalAlpha=1;
}
function initWriting(){
  const fx=$('cv-fx'),ink=$('cv-ink');
  function pos(e){
    const r=fx.getBoundingClientRect();
    return{x:(e.clientX-r.left)*fx.width/r.width,y:(e.clientY-r.top)*fx.height/r.height};
  }
  fx.addEventListener('pointerdown',e=>{
    e.preventDefault();
    try{fx.setPointerCapture(e.pointerId);}catch(err){}
    drawing=true;strokeCount++;lastP=pos(e);SFX.spark();
  });
  fx.addEventListener('pointermove',e=>{
    if(!drawing)return;
    const p=pos(e),x=ink.getContext('2d');
    x.strokeStyle='#ff9edb';x.lineWidth=26;x.lineCap='round';x.lineJoin='round';
    x.beginPath();x.moveTo(lastP.x,lastP.y);x.lineTo(p.x,p.y);x.stroke();
    spawnParts(p.x,p.y,2,1);
    if(Math.random()<.15)SFX.spark();
    lastP=p;
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>
    fx.addEventListener(ev,()=>{drawing=false;}));
  // 手機防手勢：touch-action 之外再擋原生 touch，避免豎筆被當成捲動/縮放
  ['touchstart','touchmove'].forEach(ev=>
    fx.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
  // 寫字畫面中，擋掉頁面層級的雙指縮放（另一指落在畫布外也算）與描字中的捲動
  document.addEventListener('touchmove',e=>{
    if($('scr-write').classList.contains('on')&&(drawing||e.touches.length>1))e.preventDefault();
  },{passive:false});
  ['gesturestart','gesturechange'].forEach(ev=>  // iOS Safari 專屬縮放事件
    document.addEventListener(ev,e=>{
      if($('scr-write').classList.contains('on'))e.preventDefault();
    }));
}

/* ================= 啟動 ================= */
drawSprite($('cv-hero'),SPRITES.hero,6);
drawSprite($('cv-boss-t'),SPRITES.dragon,6);
initWriting();
requestAnimationFrame(fxLoop);
go('title');
</script>
